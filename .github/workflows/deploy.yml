name: Deploy to Azure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-to-azure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Keep deploys from hanging the runner all day if azd auth stalls or
    # azd up wedges. 45 min is ample for a cold provision + image build
    # + ACA deploy; anything beyond that indicates a stuck step.
    timeout-minutes: 45
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ secrets.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Log in with Azure (federated credentials)
        # Fail fast if auth hangs instead of using the runner's 6-hour default.
        timeout-minutes: 3
        run: |
          # Fail fast if any required secret is missing rather than letting
          # azd prompt interactively (which just hangs on a non-TTY runner).
          for var in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [[ -z "${!var}" ]]; then
              echo "::error::Required secret $var is not set"
              exit 1
            fi
          done
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Provision and deploy
        run: azd up --no-prompt
        env:
          AZURE_ENV_NAME: ${{ secrets.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get deployed app URL
        id: app-url
        run: |
          APP_URL=$(azd env get-value acaEndpointUrl 2>/dev/null || echo "")
          echo "url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Run smoke test
        if: steps.app-url.outputs.url != ''
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh "${{ steps.app-url.outputs.url }}"
