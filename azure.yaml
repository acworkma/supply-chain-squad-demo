name: bed-management-demo
metadata:
  template: bed-management-squad-demo
services:
  api:
    project: ./src/api
    host: containerapp
    language: python
    docker:
      path: ../../Dockerfile
      context: ../../
hooks:
  postprovision:
    shell: sh
    run: |
      pip install azure-identity "azure-ai-projects>=2.0.0b1"
      python scripts/build_agents.py
    continueOnError: false
