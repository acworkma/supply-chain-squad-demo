name: supply-chain-squad-demo
metadata:
  template: supply-chain-squad-demo
services:
  api:
    project: ./src/api
    host: containerapp
    language: python
    docker:
      path: ../../Dockerfile
      context: ../../
hooks:
  postprovision:
    shell: sh
    run: |
      pip install azure-identity "agent-framework-azure-ai==1.0.0rc3" "agent-framework-core==1.0.0rc3"
      python scripts/build_agents.py
    continueOnError: false
