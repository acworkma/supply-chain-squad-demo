[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "supply-chain-api"
version = "0.1.0"
description = "Supply Chain Management — Agentic AI Demo API"
requires-python = ">=3.11"
dependencies = [
    "fastapi[standard]",
    "uvicorn[standard]",
    "azure-ai-projects>=2.0.0b1",
    "azure-identity",
    "pydantic>=2.0",
    "pydantic-settings",
    "sse-starlette",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "httpx",
    "ruff",
]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
